name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build APK with Buildozer
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache Buildozer
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            python3-pip python3-setuptools python3-wheel \
            git zip unzip openjdk-11-jdk autoconf libtool \
            pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo5 cmake libffi-dev libssl-dev

      - name: Install Buildozer and Cython
        run: |
          pip3 install --upgrade buildozer cython==0.29.33

      - name: Set up Android SDK
        run: |
          ANDROID_SDK=~/.buildozer/android/platform/android-sdk
          mkdir -p $ANDROID_SDK

          # Only install if sdkmanager not already present (from cache)
          if [ ! -f "$ANDROID_SDK/cmdline-tools/latest/bin/sdkmanager" ]; then
            wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdtools.zip
            unzip -q cmdtools.zip -d cmdtools_tmp
            mkdir -p $ANDROID_SDK/cmdline-tools/latest
            cp -r cmdtools_tmp/cmdline-tools/* $ANDROID_SDK/cmdline-tools/latest/
            rm -rf cmdtools_tmp cmdtools.zip
          fi

          # Legacy symlink Buildozer expects
          mkdir -p $ANDROID_SDK/tools/bin
          ln -sf $ANDROID_SDK/cmdline-tools/latest/bin/sdkmanager $ANDROID_SDK/tools/bin/sdkmanager 2>/dev/null || true
          ln -sf $ANDROID_SDK/cmdline-tools/latest/bin/avdmanager $ANDROID_SDK/tools/bin/avdmanager 2>/dev/null || true

          export PATH=$PATH:$ANDROID_SDK/cmdline-tools/latest/bin

          yes | sdkmanager --sdk_root=$ANDROID_SDK --licenses 2>/dev/null || true

          # Only install packages if not cached
          if [ ! -d "$ANDROID_SDK/build-tools/33.0.2" ]; then
            sdkmanager --sdk_root=$ANDROID_SDK \
              "build-tools;33.0.2" \
              "platforms;android-33" \
              "platform-tools"
          fi

      - name: Build APK
        run: |
          buildozer -v android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: rns-messenger-debug-apk
          path: bin/*.apk
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: bin/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
